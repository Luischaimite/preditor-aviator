<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso VIP - Aviator Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card login-box">
            <h1 class="pro">AVIATOR <span style="color:#e91e63">PRO</span></h1>
            <p>Sistema de Análise por Saturação</p>
            
            <div class="input-group">
                <label>Seu Número de Telefone:</label>
                <input type="number" id="num_cliente" placeholder="Ex: 87XXXXXXX">
            </div>

            <button class="btn-whatsapp" onclick="enviarPedidoWhatsapp()">
                PAGAR ACESSO (VIA E-MOLA/M-PESA)
            </button>
            
            <hr style="border: 0.5px solid #333; margin: 25px 0;">
            
            <div class="input-group">
                <label>Já recebeu a senha? Introduza aqui:</label>
                <input type="text" id="chave_acesso" placeholder="Sua Chave VIP">
                <button class="btn-acessar" onclick="verificarSenhaManual()">LIBERAR PREDITOR</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
