<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator IA Gold - Acesso Restrito</title>
    <style>
        body { background-color: #0b1014; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1c2127; border: 1px solid #32383e; border-top: 4px solid #e11d48; border-radius: 15px; padding: 25px; text-align: center; width: 85%; max-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Estilo da Tela de Login */
        #tela-login { display: block; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #474d57; background: #0b1014; color: white; text-align: center; box-sizing: border-box; }
        .btn-entrar { background: #e11d48; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Estilo do Painel de Sinais (Escondido no início) */
        #painel-sinais { display: none; }
        .badge-live { background: #e11d48; color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .monitor-box { background: #0b1014; border: 1px solid #32383e; border-radius: 12px; padding: 20px; margin: 15px 0; }
        #valor-sinal { font-size: 3rem; font-weight: 900; color: #00ff88; margin-top: 5px; }
        
        .btn-comprar { background: #25d366; color: white; text-decoration: none; padding: 10px; border-radius: 8px; display: block; margin-top: 15px; font-size: 0.8rem; font-weight: bold; }
        .pulse { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="card" id="tela-login">
    <h2 style="color: #e11d48;">ACESSO RESTRITO</h2>
    <p style="font-size: 0.8rem; color: #848e9c;">Introduza a sua Chave VIP para ver os sinais em tempo real.</p>
    
    <input type="password" id="input-senha" placeholder="Digite a Senha">
    <button class="btn-entrar" onclick="verificarAcesso()">LIBERAR ACESSO</button>
    
    <p style="font-size: 0.7rem; margin-top: 20px;">Não tem uma chave?</p>
    <a href="https://wa.me/258872343542?text=Olá+Cristão,+quero+comprar+a+chave+do+Aviator" class="btn-comprar">COMPRAR CHAVE (300 MT)</a>
</div>

<div class="card" id="painel-sinais">
    <div class="badge-live pulse">• SISTEMA ATIVO</div>
    <h1>AVIATOR BRAIN IA</h1>
    
    <div class="monitor-box">
        <div id="status-texto" style="color: #fcd535; font-weight: bold;">ANALISANDO...</div>
        <div id="valor-sinal">--</div>
        <div id="dica" style="font-size: 0.75rem; color: #848e9c; margin-top: 5px;">Aguardando brecha...</div>
    </div>

    <div style="font-size: 0.6rem; color: #474d57; margin-top: 15px;">
        Agente: Cristão Luis | Marracuene
    </div>
</div>

<script>
    // DEFINE A TUA SENHA AQUI
    const SENHA_CORRETA = "VIP2026";

    function verificarAcesso() {
        const senhaDigitada = document.getElementById('input-senha').value;
        
        if (senhaDigitada === SENHA_CORRETA) {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('painel-sinais').style.display = 'block';
            iniciarIA();
        } else {
            alert("Chave de acesso incorreta! Fale com o Agente Cristão.");
        }
    }

    function iniciarIA() {
        const statusTxt = document.getElementById('status-texto');
        const valorSinal = document.getElementById('valor-sinal');
        const dica = document.getElementById('dica');

        function analisar() {
            const min = new Date().getMinutes();
            if (min % 2 === 0) {
                statusTxt.innerText = "ENTRADA CONFIRMADA ✅";
                statusTxt.style.color = "#00ff88";
                const vela = (Math.random() * (2.85 - 1.40) + 1.40).toFixed(2);
                valorSinal.innerText = vela + "X";
                valorSinal.style.display = 'block';
                dica.innerText = "Retirar em " + vela + "X";
            } else {
                statusTxt.innerText = "MERCADO INSTÁVEL ⚠️";
                statusTxt.style.color = "#fcd535";
                valorSinal.style.display = 'none';
                dica.innerText = "Padrão de risco detectado.";
            }
        }
        setInterval(analisar, 10000);
        analisar();
    }
</script>

</body>
</html>
