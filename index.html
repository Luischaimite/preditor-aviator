<!<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel VIP - Aviator Pro</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('acesso_liberado') !== 'true') {
            window.location.href = "./login.html";
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3 style="color:#ff0044">● ANALISADOR AO VIVO</h3>
            <button onclick="fazerLogout()" class="btn-logout">Sair</button>
        </div>

        <div class="card main-card">
            <div id="status-box">
                <p style="font-size:12px; color:#8b949e;">ESTADO DO ALGORITMO:</p>
                <h2 id="sinal" style="font-size: 26px; margin: 10px 0;">INSERIR DADOS...</h2>
                <p id="tendencia" style="font-weight:bold; color:#58a6ff;">AGUARDANDO PADRÃO</p>
            </div>
            <div class="progress-container">
                <div id="prob-fill" style="width: 15%"></div>
            </div>
        </div>

        <div class="card input-card">
            <label>Último resultado do jogo:</label>
            <input type="number" id="valor" step="0.01" placeholder="Ex: 1.85">
            <button onclick="adicionarDado()" style="background:#2196f3; color:white; border-radius:10px;">ANALISAR VELA</button>
        </div>

        <div class="card history-card">
            <p style="font-size:12px; margin-bottom:10px;">HISTÓRICO DE ENTRADAS:</p>
            <div id="lista-resultados"></div>
        </div>

        <div class="card live-wins">
            <p style="color: #4caf50; font-size: 12px; font-weight: bold; margin-bottom: 10px;">💸 LUCROS RECENTES (MOZ):</p>
            <div id="lista-ganhos" style="text-align: left; font-size: 11px; line-height: 1.8;"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
