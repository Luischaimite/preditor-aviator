<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Predictor PRO - Cristão Luis</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #121212; border: 1px solid #333; border-radius: 20px; padding: 25px; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        /* LOGIN */
        #tela-login { display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #444; background: #000; color: white; text-align: center; box-sizing: border-box; font-size: 1rem; }
        .btn-entrar { background: #e11d48; color: white; border: none; width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* PREDICTOR */
        #painel-predictor { display: none; }
        .circle-container { position: relative; width: 180px; height: 180px; margin: 20px auto; display: flex; justify-content: center; align-items: center; }
        .outer-circle { position: absolute; width: 100%; height: 100%; border: 6px solid #1a1a1a; border-radius: 50%; border-top-color: #e11d48; }
        .animar { animation: rotate 1s linear infinite; }
        #valor-sinal { font-size: 2.8rem; font-weight: 900; color: #e11d48; }
        .rosa { color: #ff00ff !important; text-shadow: 0 0 20px #ff00ff; }

        .btn-acao { background: linear-gradient(to right, #e11d48, #991b1b); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-whats { background: #25d366; color: white; text-decoration: none; padding: 10px; border-radius: 8px; display: block; margin-top: 20px; font-size: 0.8rem; font-weight: bold; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="tela-login">
    <h2 style="color: #e11d48; margin-bottom: 5px;">ACESSO VIP</h2>
    <p style="font-size: 0.8rem; color: #848e9c;">Digite a sua chave de acesso</p>
    <input type="password" id="input-senha" placeholder="CHAVE DO AGENTE">
    <button class="btn-entrar" onclick="verificar()">LIBERAR PREDICTOR</button>
    <a href="https://wa.me/258872343542?text=Quero+comprar+a+chave+do+Predictor" class="btn-whats">COMPRAR ACESSO (300 MT)</a>
</div>

<div class="card" id="painel-predictor">
    <h3 style="font-size: 0.9rem; color: #848e9c; letter-spacing: 2px;">AVIATOR PREDICTOR PRO</h3>
    
    <div class="circle-container">
        <div class="outer-circle" id="borda"></div>
        <div id="valor-sinal">0.00x</div>
    </div>

    <div style="margin-bottom: 20px;">
        <p style="font-size: 0.75rem; color: #fcd535; margin-bottom: 5px;">Última vela da Elephant Bet:</p>
        <input type="number" id="vela-entrada" placeholder="Ex: 1.85" step="0.01">
    </div>

    <button class="btn-acao" onclick="prever()">GERAR PRÓXIMA VELA</button>
    
    <div style="font-size: 0.6rem; color: #444; margin-top: 20px;">
        Agente Oficial: Cristão Luis | 872343542
    </div>
</div>

<script>
    const CHAVE = "VIP2026";

    function verificar() {
        if(document.getElementById('input-senha').value === CHAVE) {
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('painel-predictor').style.display = 'block';
        } else {
            alert("Senha incorreta! Contacte o Agente.");
        }
    }

    function prever() {
        const entrada = document.getElementById('vela-entrada');
        const display = document.getElementById('valor-sinal');
        const borda = document.getElementById('borda');

        if(!entrada.value) { alert("Digite a última vela!"); return; }

        display.innerText = "---";
        borda.classList.add('animar');
        display.classList.remove('rosa');
        borda.style.borderTopColor = "#e11d48";

        setTimeout(() => {
            borda.classList.remove('animar');
            let res;
            const v = parseFloat(entrada.value);

            // Lógica de "Previsão"
            if (v < 1.5) res = (Math.random() * (3.5 - 2.0) + 2.0).toFixed(2);
            else if (v >= 10) res = (Math.random() * (1.9 - 1.1) + 1.1).toFixed(2);
            else res = (Math.random() * (2.5 - 1.1) + 1.1).toFixed(2);

            // Chance de Vela Rosa (acima de 10x)
            if (Math.random() > 0.93) {
                res = (Math.random() * (35.0 - 10.0) + 10.0).toFixed(2);
                display.classList.add('rosa');
                borda.style.borderTopColor = "#ff00ff";
            }

            display.innerText = res + "x";
            entrada.value = "";
        }, 1500);
    }
</script>

</body>
</html>
