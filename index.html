<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Predictor PRO - Manual</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; width: 90%; max-width: 380px; }
        
        /* O Círculo das Fotos */
        .circle-container { position: relative; width: 200px; height: 200px; margin: 0 auto 20px; display: flex; justify-content: center; align-items: center; }
        .outer-circle { position: absolute; width: 100%; height: 100%; border: 6px solid #1a1a1a; border-radius: 50%; border-top-color: #e11d48; }
        .animar { animation: rotate 1s linear infinite; }
        
        #valor-sinal { font-size: 3rem; font-weight: 900; color: #e11d48; text-shadow: 0 0 15px rgba(225,29,72,0.5); }
        .rosa { color: #ff00ff !important; text-shadow: 0 0 25px #ff00ff !important; }

        /* Input de Entrada */
        .input-box { margin-bottom: 20px; }
        input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; width: 80%; border-radius: 8px; text-align: center; font-size: 1.1rem; outline: none; }
        input:focus { border-color: #e11d48; }

        .btn-next { background: linear-gradient(to right, #e11d48, #991b1b); color: white; border: none; padding: 15px 50px; border-radius: 10px; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; width: 85%; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .footer { font-size: 0.7rem; color: #444; margin-top: 25px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.imgur.com/uG9X3yO.png" style="width: 80px; margin-bottom: 10px;" alt="Avião">
    <h2 style="font-size: 1rem; color: #848e9c; letter-spacing: 2px;">AVIATOR PREDICTOR</h2>

    <div class="circle-container">
        <div class="outer-circle" id="border"></div>
        <div id="valor-sinal">0.00x</div>
    </div>

    <div class="input-box">
        <p style="font-size: 0.8rem; color: #fcd535;">Digite a última vela da Elephant Bet:</p>
        <input type="number" id="vela-atual" placeholder="Ex: 1.50" step="0.01">
    </div>

    <button class="btn-next" onclick="gerarPrevisao()">OBTER SINAL</button>
    
    <div class="footer">AGENTE: CRISTÃO LUIS | 872343542</div>
</div>

<script>
    function gerarPrevisao() {
        const inputVela = document.getElementById('vela-atual');
        const display = document.getElementById('valor-sinal');
        const border = document.getElementById('border');
        
        if (inputVela.value === "") {
            alert("Por favor, digite a última vela!");
            return;
        }

        // Inicia animação de "Processando"
        display.innerText = "---";
        display.classList.remove('rosa');
        border.classList.add('animar');
        border.style.borderTopColor = "#e11d48";

        setTimeout(() => {
            border.classList.remove('animar');
            const velaDigitada = parseFloat(inputVela.value);
            let proximaVela;

            // LÓGICA DE PREVISÃO (Simulada para parecer real)
            if (velaDigitada < 2.0) {
                // Se a última foi baixa, a próxima tem chance de ser ROXA
                proximaVela = (Math.random() * (4.5 - 2.1) + 2.1).toFixed(2);
            } else if (velaDigitada >= 2.0 && velaDigitada < 10) {
                // Se a última foi média, gera uma variada
                proximaVela = (Math.random() * (2.5 - 1.2) + 1.2).toFixed(2);
            } else {
                // Se a última foi ROSA, a próxima costuma ser baixa (azuis)
                proximaVela = (Math.random() * (1.8 - 1.0) + 1.0).toFixed(2);
            }

            // SORTEIO DE VELA ROSA (5% de chance de forçar uma rosa no sinal)
            if (Math.random() > 0.95) {
                proximaVela = (Math.random() * (25.0 - 10.0) + 10.0).toFixed(2);
            }

            // Mostrar o resultado
            display.innerText = proximaVela + "x";
            
            // Se for sinal ROSA (Acima de 10)
            if (parseFloat(proximaVela) >= 10.0) {
                display.classList.add('rosa');
                border.style.borderTopColor = "#ff00ff";
            }

            inputVela.value = ""; // Limpa o campo para a próxima
        }, 2000); // 2 segundos de "Análise"
    }
</script>

</body>
</html>
