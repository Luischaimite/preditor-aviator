<div class="card login-box">
    <h2 class="pro">LIBERAR PREDITOR</h2>
    <p>Pagamento via e-Mola ou M-Pesa</p>
    
    <div class="input-group" style="margin-bottom: 15px;">
        <label>Teu Número de Telefone:</label>
        <input type="number" id="num_cliente" placeholder="Ex: 872343542" style="width: 100%;">
    </div>

    <button class="btn-acessar" onclick="enviarPedidoWhatsapp()" style="background: #25D366; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer;">
        PAGAR AGORA (VIA WHATSAPP)
    </button>
    
    <hr style="border: 0.5px solid #333; margin: 20px 0;">
    
    <div class="input-group">
        <label>Já tens a senha? Introduz aqui:</label>
        <input type="text" id="chave_acesso" placeholder="Digita a senha que recebeste" style="width: 100%;">
        <button onclick="verificarSenhaManual()" style="margin-top: 10px; width: 100%; background: #4caf50; color: white; border: none; padding: 10px; border-radius: 8px;">ENTRAR NO PREDITOR</button>
    </div>
</div>
