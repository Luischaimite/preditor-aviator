<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Aviator Pro</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Proteção: Se não logou, volta para o login
        if (localStorage.getItem('acesso_liberado') !== 'true') {
            window.location.href = "./login.html";
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>PAINEL DE SINAIS</h2>
            <button onclick="fazerLogout()" class="btn-logout">Sair</button>
        </div>

        <div class="card main-card">
            <div id="status-box">
                <p>STATUS DO MERCADO:</p>
                <h3 id="sinal">AGUARDANDO DADOS...</h3>
                <p>TENDÊNCIA: <span id="tendencia">---</span></p>
            </div>

            <div class="progress-container">
                <div id="prob-fill" style="width: 0%"></div>
            </div>
        </div>

        <div class="card input-card">
            <input type="number" id="valor" step="0.01" placeholder="Último Multiplicador (Ex: 1.50)">
            <button onclick="adicionarDado()">ANALISAR</button>
        </div>

        <div class="card history-card">
            <p>HISTÓRICO RECENTE:</p>
            <div id="lista-resultados"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
