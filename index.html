<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel VIP - Aviator Pro</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (localStorage.getItem('acesso_liberado') !== 'true') {
            window.location.href = "./login.html";
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>SINAIS EM TEMPO REAL</h3>
            <button onclick="fazerLogout()" class="btn-logout">Sair</button>
        </div>

        <div class="card main-card">
            <div id="status-box">
                <p>STATUS DO MERCADO:</p>
                <h2 id="sinal">AGUARDANDO DADOS...</h2>
                <p>TENDÊNCIA: <span id="tendencia">ANALISANDO</span></p>
            </div>
            <div class="progress-container">
                <div id="prob-fill" style="width: 10%"></div>
            </div>
        </div>

        <div class="card input-card">
            <label>Último resultado do jogo:</label>
            <input type="number" id="valor" step="0.01" placeholder="Ex: 1.45">
            <button onclick="adicionarDado()" style="background:#2196f3; color:white;">ANALISAR VELA</button>
        </div>

        <div class="card history-card">
            <p>HISTÓRICO RECENTE:</p>
            <div id="lista-resultados"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
